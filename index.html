<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300&display=swap" rel="stylesheet">
    <title>ASYNCHROUNOUS JAVASCRIPT FUNCTION</title>
    <link rel="stylesheet" href="./index.css">
  </head>
  <body>
    <!-- for the button -->
      <div class="div-card-remaining">
        <button id="deck-card" class="deck-card">New Deck</button>
        <div class="newdeck-remaining" id="newdeck-remaining"></div>
      </div>
      <h1 id="winner-slot" class="winner-slot">Game of War</h1>
      <p id="computer-score" class="scores">0</p>
      <div id="card-container" class="card-container"></div>
      <p id="my-score" class="scores">0</p>
      <button id="draw-card" class="draw-card">Draw New Card</button>
      <!-- Audio sound-->
      <audio id="card-sound" src="https://pixabay.com/sound-effects/flipcard-91468/"></audio>
      <audio id="win-sound" src="https://pixabay.com/sound-effects/claps-44774/"></audio>


    <script src="./index.js"></script>
  </body>
</html>
